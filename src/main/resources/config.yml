# UDP HAProxy Reverse Proxy Configuration
# Follows Geyser-style configuration for Minecraft proxies

# The address the proxy will listen on
bind-address: "0.0.0.0"

# The port the proxy will listen on (default: Bedrock port)
bind-port: 19132

# The address of the remote/backend server (used when no backends list is configured)
remote-address: "127.0.0.1"

# The port of the remote/backend server (used when no backends list is configured)
remote-port: 25565

# Load balancing strategy. Supported values:
#   "roundrobin" - Distribute connections evenly across backends (like HAProxy default)
#   "leastconn"  - Route to the backend with fewest active sessions (like HAProxy leastconn)
#   "random"     - Select a random backend for each new session (like HAProxy random)
load-balancing-strategy: "roundrobin"

# List of backend servers for load balancing.
# If this list is empty or not specified, falls back to remote-address/remote-port.
# Each backend has: address, port, and optional weight (default: 1).
# Higher weight means the backend receives proportionally more connections.
#
# backends:
#   - address: "10.0.0.1"
#     port: 25565
#     weight: 1
#   - address: "10.0.0.2"
#     port: 25565
#     weight: 2
#   - address: "10.0.0.3"
#     port: 25565
#     weight: 1

# Whether to use HAProxy PROXY protocol v2 when forwarding to the backend.
# When enabled, the real client IP/port is sent to the backend via
# a PROXY protocol v2 header prepended to the first UDP packet.
#
# ⚠️  WARNING: Only enable this if your backend server explicitly supports
#    HAProxy PROXY protocol v2. Most game servers (Minecraft Bedrock, etc.)
#    do NOT support this and will ignore all packets if enabled.
#
#    If clients cannot see your server or connect, this is likely the issue.
#    Keep this set to 'false' unless you know your backend supports it.
use-proxy-protocol: false

# Whether to expect HAProxy PROXY protocol v2 headers on incoming packets.
# Enable this if the proxy sits behind another HAProxy or load balancer
# that sends PROXY protocol headers.
receive-proxy-protocol: false

# Session timeout in seconds. Sessions are cleaned up after this
# period of inactivity from the client.
session-timeout-seconds: 60

# Maximum number of concurrent sessions (0 = unlimited)
max-sessions: 0

# Enable debug logging of proxied packets
debug-mode: false
